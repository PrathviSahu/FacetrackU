services:
  # Backend Web Service - Docker
  - type: web
    name: factracku-backend
    env: docker
    dockerContext: .
    dockerfilePath: backend/Dockerfile
    plan: free
    region: oregon
    healthCheckPath: /api/actuator/health
    envVars:
      - key: SPRING_DATASOURCE_URL
        value: jdbc:postgresql://aws-1-ap-south-1.pooler.supabase.com:6543/postgres?prepareThreshold=0
      - key: SPRING_DATASOURCE_USERNAME
        value: postgres.mvgqvrlohtzklbtquumw
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: https://factracku-frontend.onrender.com # Placeholder, update after frontend is live
      - key: SERVER_PORT
        value: 8080

  # Frontend Web Service - Docker
  - type: web
    name: factracku-frontend
    env: docker
    dockerContext: .
    dockerfilePath: frontend/Dockerfile
    plan: free
    region: oregon
    envVars:
      - key: REACT_APP_API_URL
        value: https://factracku-backend.onrender.com
